services:
  - type: web
    name: horrorlauncher-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: horrorlauncher-db
          property: connectionString

databases:
  - name: horrorlauncher-db
    databaseName: horrorlauncher
    user: hluser
